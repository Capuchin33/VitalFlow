# Repository secrets required: VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY
# Enable GitHub Pages: Settings → Pages → Source: GitHub Actions
#
# Single deploy job (upload + deploy in one job) avoids duplicate "github-pages"
# artifacts that break actions/deploy-pages. See actions/upload-pages-artifact#97

name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; do not cancel in-progress Pages deploys (GitHub starter recommendation).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install and build
        working-directory: web
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BASE: /${{ github.event.repository.name }}/
        run: |
          npm ci
          npm run build
      - uses: actions/upload-pages-artifact@v4
        with:
          path: web/dist
      - id: deployment
        uses: actions/deploy-pages@v5
